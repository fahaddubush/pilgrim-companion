name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile Python
        run: python -m compileall -q main.py config.py app scripts tests
      - name: Run tests
        run: pytest
      - name: Audit bundled knowledge base
        run: python scripts/audit_kb.py
